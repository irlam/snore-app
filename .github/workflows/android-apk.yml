# SnoreNudge – Build Debug APKs (CI)
#
# What this file does
# - Builds debug APKs for both the phone (":app") and watch (":wear") modules.
# - Uploads both APKs as GitHub Actions workflow artifacts.
# - Creates or updates a GitHub Release tagged "latest-apks" with both APKs as assets.
#
# File name
# - .github/workflows/android-apk.yml
#
# Times
# - No scheduled runs in this workflow (so no UK-time/UTC conversion needed).

name: Build Debug APK

on:
  push:
  workflow_dispatch:

concurrency:
  group: apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-debug-apk:
    name: Build debug APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build debug APK (:app)
        run: ./gradlew :app:assembleDebug

      - name: Build debug APK (:wear)
        run: ./gradlew :wear:assembleDebug

      - name: Rename APK outputs
        run: |
          cp app/build/outputs/apk/debug/*.apk phone-debug.apk
          cp wear/build/outputs/apk/debug/*.apk watch-debug.apk

      - name: Upload phone APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: phone-debug-apk
          path: phone-debug.apk
          if-no-files-found: error
          retention-days: 3

      - name: Upload watch APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: watch-debug-apk
          path: watch-debug.apk
          if-no-files-found: error
          retention-days: 3

      - name: Create or update GitHub Release with APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apks
          name: Latest APKs
          files: |
            phone-debug.apk
            watch-debug.apk
